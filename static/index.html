<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0e1f18">
<title>LAN Poker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/app.css">
</head>
<body>

<!-- ============ JOIN OVERLAY ============ -->
<div id="join-overlay" class="overlay" hidden>
  <form id="join-form" class="join-card" autocomplete="off">
    <div class="brand-mark">
      <span class="suit suit-s">♠</span><span class="suit suit-h">♥</span>
      <span class="suit suit-d">♦</span><span class="suit suit-c">♣</span>
    </div>
    <h1 class="join-title">LAN Poker</h1>
    <p class="join-tag">Single-table No-Limit Hold'em</p>

    <label class="field">
      <span>Display name</span>
      <input id="join-username" type="text" maxlength="24" required autocomplete="off">
    </label>
    <label class="field">
      <span>Buy-in</span>
      <input id="join-stack" type="number" min="1" value="1000" required>
    </label>

    <button id="join-submit" type="submit" class="btn btn-primary">Request seat</button>
    <p id="join-msg" class="join-msg"></p>
  </form>
</div>

<!-- ============ SESSION ENDED OVERLAY ============ -->
<div id="ended-overlay" class="overlay" hidden>
  <div class="join-card">
    <h1 class="join-title">Session ended</h1>
    <div id="ended-final" class="final-list"></div>
  </div>
</div>

<!-- ============ TOP BAR ============ -->
<header class="topbar">
  <div class="brand">
    <span class="brand-name">LANPOKER</span>
  </div>
  <div class="topbar-meta">
    <div class="meta-item">
      <span class="meta-label">Blinds</span>
      <span class="meta-value mono" id="blinds-display">—</span>
    </div>
    <div class="meta-item">
      <span class="meta-label">Hand</span>
      <span class="meta-value" id="street-display">—</span>
    </div>
    <button id="log-toggle" class="icon-btn" title="Event log" aria-label="Toggle log">≡</button>
    <span id="conn-dot" class="conn-dot" title="Disconnected"></span>
  </div>
</header>

<!-- ============ MAIN TABLE ============ -->
<main class="stage">
  <section id="opponents" class="opponents" aria-label="Other players"></section>

  <section class="center" aria-label="Community cards and pot">
    <div class="pot-row">
      <span class="pot-label">POT</span>
      <span id="pot-total" class="pot-total mono">0</span>
    </div>
    <div id="board" class="board"></div>
    <div id="side-pots" class="side-pots"></div>
    <div id="message" class="message"></div>
  </section>
</main>

<!-- ============ MY SEAT (sticky) ============ -->
<footer id="my-seat" class="my-seat">
  <div class="my-meta">
    <div class="my-name" id="my-name">—</div>
    <div class="my-role mono" id="my-role"></div>
    <div class="my-stack mono" id="my-stack"></div>
  </div>
  <div id="my-cards" class="my-cards"></div>
  <div id="my-actions" class="my-actions"></div>
</footer>

<!-- ============ EVENT LOG DRAWER ============ -->
<aside id="log-drawer" class="log-drawer" hidden>
  <div class="log-head">
    <span>Event log</span>
    <button id="log-close" class="icon-btn" aria-label="Close log">×</button>
  </div>
  <div id="log-body" class="log-body"></div>
</aside>

<script src="/socket.io.min.js"></script>
<script src="/app.js" defer></script>
</body>
</html>
